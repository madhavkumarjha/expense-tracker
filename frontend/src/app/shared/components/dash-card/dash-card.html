<div
  [class]="
    'p-6 rounded-2xl shadow-sm border-l-4 transition-all hover:scale-105 bg-white ' +
    config[type].border
  "
>
  <div class="flex justify-between items-center">
    <div>
      <p class="text-slate-500 text-sm font-medium uppercase">{{ label }}</p>
      <h2 class="text-2xl font-bold mt-1 text-slate-800">₹{{ value | number }}</h2>
    </div>

    <div
      [class]="
        'h-10 w-10 rounded-full flex items-center justify-center opacity-20 ' + config[type].bg
      "
    >
      <span [class]="'font-bold ' + config[type].text">{{ type[0].toUpperCase() }}</span>
    </div>
  </div>
</div>
