<div class="budget-modal-panel w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl ring-1 ring-slate-200">
  <p class="text-sm font-medium uppercase tracking-[0.2em] text-rose-400">Delete</p>
  <h3 class="mt-2 text-xl font-bold text-slate-900">{{ title }}</h3>
  <p class="mt-3 text-sm text-slate-500">
    {{ description }}
  </p>

  <div class="mt-6 flex gap-3">
    <button
      type="button"
      (click)="cancel.emit()"
      class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-600 transition hover:bg-slate-50"
    >
      {{ cancelLabel }}
    </button>
    <button
      type="button"
      (click)="confirm.emit()"
      class="flex-1 rounded-2xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-500"
    >
      {{ confirmLabel }}
    </button>
  </div>
</div>
