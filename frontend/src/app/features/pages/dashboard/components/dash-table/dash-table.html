<table class="w-full text-left">
      <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
        <tr>
          <th class="px-6 py-4">Title</th>
          <th class="px-6 py-4">Category</th>
          <th class="px-6 py-4">Amount</th>
          <th class="px-6 py-4">Date</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        @for (item of transactions; track item.title) {
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 font-medium">{{item.title}}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 bg-slate-100 rounded text-xs capitalize">{{item.category}}</span>
            </td>
            <td class="px-6 py-4 text-red-600 font-bold">₹{{item.amount}}</td>
            <td class="px-6 py-4 text-slate-500">{{item.date}}</td>
          </tr>
        }
      </tbody>
    </table>
